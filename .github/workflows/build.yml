name: Build and run tests
'on':
- push
- workflow_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/pw-browsers

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Disable man-db auto-update (prevents apt-get hangs)
      run: sudo rm -f /var/lib/man-db/auto-update

    - name: Run post create script for devcontainer setup
      run: ./.devcontainer/postCreate.sh
      timeout-minutes: 5

    - name: Run tests
      run: robot --outputdir=test-results/ tests/
      timeout-minutes: 5

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: test-results
        retention-days: 7
